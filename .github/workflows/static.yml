name: 테스트 및 배포 파이프라인
on: [push]
jobs:
  test-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # [테스트 단계] 파일에 '결제 실패' 로직이 포함되어 있는지 검사
      - name: 필수 기능 체크
        run: |
          grep -q "결제 실패" index.html
          if [ $? -eq 0 ]; then
            echo "테스트 통과: 결제 실패 로직이 포함되어 있습니다."
          else
            echo "테스트 실패: 결제 실패 안내 문구가 사라졌습니다!"
            exit 1
          fi

      # [성공 시 알림]
      - name: 성공 슬랙 알림
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: '{"text": "🚀 [어디든 가자] 테스트 완료 및 서비스 배포 성공!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_URL }}

      # [실패 시 알림]
      - name: 실패 슬랙 알림
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: '{"text": "⚠️ [어디든 가자] 배포 실패! 테스트 단계에서 문제가 발견되었습니다. (결제 실패 로직 확인 필요)"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_URL }}
